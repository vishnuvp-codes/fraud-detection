<!DOCTYPE html>
<html>
<head>
    <title>Fraud Detection</title>
</head>
<body>
    <h2>Fraud Detection System</h2>

    <form action="/predict" method="post">
        <label>Amount:</label><br>
        <input type="number" name="amount"><br><br>

        <label>Time:</label><br>
        <input type="number" name="time"><br><br>

        <button type="submit">Predict</button>
    </form>

    <h3>{{ prediction_text }}</h3>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}
form {
    background: white;
    padding: 20px;
    display: inline-block;
    border-radius: 10px;
}
button {
    background: blue;
    color: white;
    padding: 10px;
}
</style>
</body>
</html>
